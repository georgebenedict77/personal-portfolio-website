<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalogue | Benjoji77</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0b0f16;--panel:#0f1724;--line:rgba(201,167,94,.35);--text:#eef2f7;--muted:#9ca8b8;--accent:#c9a75e;}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Manrope",sans-serif;background:linear-gradient(180deg,#0b0f16,#090d14);color:var(--text);line-height:1.6;padding:18px}
    .page{max-width:1100px;margin:0 auto;background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:0 12px 36px rgba(0,0,0,.28);padding:16px}
    .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:10px;flex-wrap:wrap}
    .btn{padding:9px 12px;border-radius:10px;font-weight:700;text-decoration:none;border:1px solid var(--line);background:rgba(12,18,30,.9);color:var(--accent);box-shadow:0 10px 24px rgba(0,0,0,.2)}
    .view{display:grid;grid-template-columns:minmax(320px,1.1fr) minmax(260px,0.9fr);gap:16px;align-items:center}
    .img-wrap{background:#0c131f;border:1px solid var(--line);border-radius:12px;overflow:hidden;display:grid;place-items:center}
    .img-wrap img{width:100%;height:auto;display:block}
    .panel{border:1px solid var(--line);border-radius:12px;padding:16px;background:rgba(255,255,255,.02);box-shadow:0 8px 24px rgba(0,0,0,.18)}
    .panel h2{margin-bottom:8px;color:var(--accent);font-size:1.3rem}
    .panel p{color:var(--muted)}
    @media(max-width:820px){.view{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="page">
    <div class="top">
      <a class="btn" href="../../index.html">← Back</a>
      <div style="font-weight:700;color:var(--accent);">Catalogue</div>
    </div>
    <div class="view">
      <div class="img-wrap">
        <img src="../img/catalogue.jpg" alt="Design and services catalogue">
      </div>
      <div class="panel">
        <h2>Overview</h2>
        <p>Greenleaf Natural Health Remedies catalogue cover — focused on freshness and authentic flavor. (Add inner pages/PDF later if you want a full flip-through.)</p>
      </div>
    </div>
  </div>
</body>
</html>
